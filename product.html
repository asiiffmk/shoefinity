<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product | SHOEFINITY</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { background: #000; color: white; overflow-x: hidden; }
.container { width: 94%; max-width: 1200px; margin: auto; }
header { padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; background: #000; z-index: 1001; }
.nav { display: flex; justify-content: space-between; align-items: center; }
.brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; position: absolute; left: 50%; transform: translateX(-50%); }
.brand img { height: 35px; }
.brand span { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: 2px; font-size: 18px; }
.menu-toggle { display: flex; flex-direction: column; cursor: pointer; gap: 5px; z-index: 1100; }
.menu-toggle span { width: 22px; height: 2px; background: white; transition: 0.3s ease; display: block; }
.menu-toggle.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.menu-toggle.active span:nth-child(2) { opacity: 0; }
.menu-toggle.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.nav-actions { display: flex; align-items: center; gap: 15px; }
.cart-btn-nav { background: none; border: none; color: white; font-size: 18px; cursor: pointer; text-decoration: none; }
nav { position: fixed; top: 0; left: -100%; background: #000; width: 80%; max-width: 320px; height: 100%; min-height: 100vh; display: flex; flex-direction: column; transition: 0.4s ease; z-index: 1000; border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; }
nav.active { left: 0; }
.nav-inner { display: flex; flex-direction: column; height: 100%; min-height: 100vh; padding: 90px 35px 35px 35px; }
.menu-list { display: flex; flex-direction: column; gap: 22px; list-style: none; margin-bottom: auto; }
.menu-list a { text-decoration: none; color: white; font-size: 16px; display: flex; align-items: center; gap: 15px; font-weight: 500; transition: 0.2s; }
.menu-list a::before { content: '\2022'; color: white; font-size: 20px; }
.drawer-footer { padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 40px; }
.social-links { display: flex; gap: 20px; margin-bottom: 18px; align-items: center; }
.social-links a { color: white; font-size: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; transition: 0.2s; text-decoration: none; }
.social-links a:hover { color: #00ff88; border-color: #00ff88; background: rgba(0,255,136,0.08); }
.footer-text { font-size: 11px; color: #555; letter-spacing: 1px; }
.nav-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(5px); visibility: hidden; opacity: 0; transition: 0.4s; z-index: 999; }
.nav-mask.active { visibility: visible; opacity: 1; }
.product-detail { padding: 30px 0 80px; }
.detail-grid { display: flex; flex-direction: column; gap: 30px; }
@media (min-width: 900px) {
  .detail-grid { flex-direction: row; gap: 50px; align-items: flex-start; }
  .detail-left { width: 50%; position: sticky; top: 90px; }
  .detail-right { flex: 1; }
}
.main-img-wrap { width: 100%; aspect-ratio: 3/4; border-radius: 16px; overflow: hidden; background: #1a1a1a; cursor: zoom-in; margin-bottom: 12px; }
.main-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
.main-img-wrap:hover img { transform: scale(1.03); }
.thumb-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.thumb-row::-webkit-scrollbar { height: 3px; }
.thumb-row::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
.thumb-row img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; cursor: pointer; opacity: 0.5; border: 2px solid transparent; flex-shrink: 0; transition: 0.2s; }
.thumb-row img.active { opacity: 1; border-color: #00ff88; }
.thumb-row img:hover { opacity: 1; }
.product-category-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #00ff88; margin-bottom: 10px; display: block; }
.product-title { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 600; text-transform: uppercase; line-height: 1.2; margin-bottom: 14px; }
@media (min-width: 900px) { .product-title { font-size: 22px; } }
.price-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.price-original { font-size: 15px; color: #555; text-decoration: line-through; font-weight: 500; }
.price-current { font-size: 18px; color: white; font-weight: 500; }
.sale-tag { background: #ff4444; color: white; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px; }
.product-description { font-size: 14px; color: #ccc; line-height: 1.7; margin-bottom: 24px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px 18px; }
.section-label { font-size: 11px; text-transform: uppercase; color: #666; letter-spacing: 1px; margin-bottom: 10px; display: block; }
.size-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.size-btn { min-width: 70px; height: 54px; border-radius: 10px; background: #1a1a1a; border: 1px solid #333; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 13px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 0 10px; }
.size-btn:hover { border-color: #00ff88; }
.size-btn.active { background: #00ff88; color: #000; border-color: #00ff88; }
.size-uk { font-size: 12px; font-weight: 700; color: white; }
.size-eu { font-size: 10px; font-weight: 500; color: #aaa; }
.size-btn.active .size-uk { color: #000; }
.size-btn.active .size-eu { color: #000; }
.qty-row { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
.qty-ctrl { display: flex; align-items: center; border: 1px solid #333; border-radius: 10px; overflow: hidden; }
.qty-ctrl button { background: #1a1a1a; border: none; color: white; padding: 12px 18px; cursor: pointer; font-size: 18px; transition: 0.2s; }
.qty-ctrl button:hover { background: #222; }
.qty-ctrl span { width: 40px; text-align: center; font-size: 16px; font-weight: 600; }
.action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.add-btn { background: #00ff88; color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 14px; letter-spacing: 1px; transition: 0.2s; }
.add-btn:hover { background: #00e077; transform: translateY(-2px); }
.buy-btn { background: white; color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 14px; letter-spacing: 1px; transition: 0.2s; }
.buy-btn:hover { background: #e0e0e0; transform: translateY(-2px); }
@keyframes shimmer { 0% { background-position: -600px 0; } 100% { background-position: 600px 0; } }
.skel { background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%); background-size: 600px 100%; animation: shimmer 1.4s infinite; border-radius: 10px; }
.skel-img { width: 100%; aspect-ratio: 3/4; border-radius: 16px; }
.skel-line { height: 14px; margin-bottom: 12px; border-radius: 6px; }
.skel-line.w60 { width: 60%; }
.skel-line.w40 { width: 40%; }
.skel-line.w80 { width: 80%; }
.img-viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 9999; display: none; align-items: center; justify-content: center; }
.img-viewer.active { display: flex; }
.img-viewer img { max-width: 92vw; max-height: 88vh; object-fit: contain; border-radius: 8px; user-select: none; }
.img-viewer-close { position: absolute; top: 18px; right: 22px; font-size: 32px; color: white; background: none; border: none; cursor: pointer; z-index: 10000; opacity: 0.8; }
.img-viewer-close:hover { opacity: 1; }
.img-viewer-prev, .img-viewer-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: white; font-size: 22px; padding: 14px 18px; cursor: pointer; border-radius: 8px; transition: 0.2s; z-index: 10000; }
.img-viewer-prev { left: 12px; }
.img-viewer-next { right: 12px; }
.img-viewer-prev:hover, .img-viewer-next:hover { background: rgba(255,255,255,0.2); }
.img-viewer-counter { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 13px; color: #aaa; background: rgba(0,0,0,0.5); padding: 5px 14px; border-radius: 20px; }
footer { text-align: center; padding: 30px 0; font-size: 12px; color: #666; border-top: 1px solid rgba(255,255,255,0.08); background: #000; }
</style>
</head>
<body>

<div class="img-viewer" id="imgViewer">
  <button class="img-viewer-close" onclick="closeViewer()"><i class="fas fa-times"></i></button>
  <button class="img-viewer-prev" onclick="viewerNav(-1)"><i class="fas fa-chevron-left"></i></button>
  <img src="" id="viewerImg" alt="">
  <button class="img-viewer-next" onclick="viewerNav(1)"><i class="fas fa-chevron-right"></i></button>
  <div class="img-viewer-counter" id="viewerCounter"></div>
</div>

<div class="nav-mask" id="navMask"></div>

<nav id="sideNav">
  <div class="nav-inner">
    <ul class="menu-list">
      <li><a href="index.html">Home</a></li>
      <li><a href="men.html">Men</a></li>
      <li><a href="women.html">Women</a></li>
      <li><a href="accessories.html">Accessories</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
    <div class="drawer-footer">
      <div class="social-links">
        <a href="https://instagram.com/shoefinity.co"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/917593001084"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.facebook.com/share/1HzPjhMR6M/" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="mailto:supportshoefinity.co@gmail.com"><i class="far fa-envelope"></i></a>
      </div>
      <div class="footer-text">&copy; 2026 Shoefinity Premium</div>
    </div>
  </div>
</nav>

<header>
  <div class="container nav">
    <div class="menu-toggle" id="menuBtn"><span></span><span></span><span></span></div>
    <a href="index.html" class="brand">
      <img src="logo.png" alt="Logo">
      <span>SHOEFiNITY</span>
    </a>
    <div class="nav-actions">
      <a href="cart.html" class="cart-btn-nav"><i class="fas fa-shopping-bag"></i></a>
    </div>
  </div>
</header>

<section class="product-detail">
  <div class="container">
    <div class="detail-grid" id="detailGrid">
      <div class="detail-left">
        <div class="skel skel-img"></div>
      </div>
      <div class="detail-right">
        <div class="skel skel-line w40" style="margin-bottom:16px"></div>
        <div class="skel skel-line w80" style="height:28px;margin-bottom:16px"></div>
        <div class="skel skel-line w40" style="height:22px;margin-bottom:24px"></div>
        <div class="skel skel-line w80" style="margin-bottom:8px"></div>
        <div class="skel skel-line w60" style="margin-bottom:8px"></div>
        <div class="skel skel-line w80" style="margin-bottom:8px"></div>
      </div>
    </div>
  </div>
</section>

<footer><p>&copy; 2026 Shoefinity. All Rights Reserved.</p></footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, getDoc, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDh2DnnTGlLb2fVsdDsTheKgkBVzJBPcJc",
  authDomain: "shoefinity-store.firebaseapp.com",
  projectId: "shoefinity-store",
  storageBucket: "shoefinity-store.appspot.com",
  messagingSenderId: "876278213787",
  appId: "1:876278213787:web:80269ea8a13e119afbea3e"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
enableIndexedDbPersistence(db).catch(err => console.log('Cache:', err));

const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
let product = null;
let viewerImages = [], viewerIndex = 0;
let selectedSize = "", currentQty = 1;

if (!productId) {
  document.getElementById('detailGrid').innerHTML = "<p style='color:#f66;text-align:center;grid-column:1/-1'>No product specified.</p>";
} else {
  loadProduct();
}

async function loadProduct() {
  try {
    const snap = await getDoc(doc(db, "products", productId));
    if (!snap.exists()) {
      document.getElementById('detailGrid').innerHTML = "<p style='color:#f66;text-align:center;grid-column:1/-1'>Product not found.</p>";
      return;
    }
    product = { id: snap.id, ...snap.data() };
    document.title = product.name + " | SHOEFINITY";
    renderProduct();
  } catch(err) {
    document.getElementById('detailGrid').innerHTML = "<p style='color:#f66;text-align:center;grid-column:1/-1'>Error loading product.</p>";
  }
}

function ukToEU(uk) {
  const num = parseFloat(uk);
  if (isNaN(num)) return null;
  return Math.round(num + 33);
}

function renderProduct() {
  viewerImages = [];
  if (product.image) viewerImages.push(product.image);
  if (product.images && product.images.length > 0) {
    product.images.forEach(img => { if (img && !viewerImages.includes(img)) viewerImages.push(img); });
  }

  let sizeArr = ["7","8","9","10"];
  if (product.sizes && product.sizes.length > 0) {
    if (Array.isArray(product.sizes)) {
      if (product.sizes.length === 1 && String(product.sizes[0]).includes(',')) {
        sizeArr = product.sizes[0].split(',').map(s => s.trim()).filter(Boolean);
      } else { sizeArr = product.sizes.map(s => String(s).trim()).filter(Boolean); }
    } else if (typeof product.sizes === 'string') {
      sizeArr = product.sizes.split(',').map(s => s.trim()).filter(Boolean);
    }
  }
  selectedSize = sizeArr[0] || "";

  const hasOffer = product.originalPrice && product.originalPrice > product.price;
  const discount = hasOffer ? Math.round((1 - product.price / product.originalPrice) * 100) : 0;
  const showEU = product.category === 'Men' || product.category === 'Women' || product.category === 'Unisex';

  const thumbsHTML = viewerImages.map((img, i) =>
    `<img src="${img}" class="${i === 0 ? 'active' : ''}" onclick="switchImg(this, '${img}', ${i})" alt="thumb">`
  ).join('');

  const sizesHTML = sizeArr.map((s, i) => {
    const eu = showEU ? ukToEU(s) : null;
    const label = eu
      ? `<span class="size-uk">UK ${s}</span><span class="size-eu">EU ${eu}</span>`
      : s;
    return `<button class="size-btn${i === 0 ? ' active' : ''}" onclick="selectSize(this, '${s}')">${label}</button>`;
  }).join('');

  document.getElementById('detailGrid').innerHTML = `
    <div class="detail-left">
      <div class="main-img-wrap" onclick="openViewer(0)" id="mainImgWrap">
        <img src="${product.image || ''}" id="mainImg" alt="${product.name}">
      </div>
      <div class="thumb-row" id="thumbRow">${thumbsHTML}</div>
    </div>
    <div class="detail-right">
      <span class="product-category-tag">${product.category || ''}</span>
      <h1 class="product-title">${product.name}</h1>
      <div class="price-row">
        ${hasOffer ? `<span class="price-original">Rs. ${Number(product.originalPrice).toLocaleString('en-IN')}</span>` : ''}
        <span class="price-current">Rs. ${Number(product.price).toLocaleString('en-IN')}</span>
        ${hasOffer ? `<span class="sale-tag">${discount}% OFF</span>` : ''}
      </div>
      ${product.description ? `<p class="product-description">${product.description}</p>` : ''}
      <span class="section-label">Select Size</span>
      <div class="size-grid">${sizesHTML}</div>
      <span class="section-label">Quantity</span>
      <div class="qty-row">
        <div class="qty-ctrl">
          <button onclick="updateQty(-1)">−</button>
          <span id="qtyVal">1</span>
          <button onclick="updateQty(1)">+</button>
        </div>
      </div>
      <div class="action-btns">
        <button class="add-btn" onclick="addToCart()">Add to Cart</button>
        <button class="buy-btn" onclick="buyNow()">Buy Now</button>
      </div>
    </div>
  `;
}

window.switchImg = function(el, src, index) {
  document.getElementById('mainImg').src = src;
  document.querySelectorAll('.thumb-row img').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('mainImgWrap').onclick = () => openViewer(index);
};

window.selectSize = function(btn, size) {
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedSize = size;
};

window.updateQty = function(val) {
  currentQty = Math.max(1, currentQty + val);
  document.getElementById('qtyVal').innerText = currentQty;
};

window.addToCart = function() {
  if (!selectedSize) { alert("Please select a size!"); return; }
  let cart = JSON.parse(localStorage.getItem('shoefinity_cart')) || [];
  let existing = cart.find(item => item.name === product.name && item.size === selectedSize);
  if (existing) { existing.qty = (existing.qty || 1) + currentQty; }
  else { cart.push({ name: product.name, price: product.price, img: product.image, size: selectedSize, qty: currentQty }); }
  localStorage.setItem('shoefinity_cart', JSON.stringify(cart));
  alert("Added " + currentQty + " x " + product.name + " (Size " + selectedSize + ") to bag!");
};

window.buyNow = function() {
  if (!selectedSize) { alert("Please select a size!"); return; }
  localStorage.setItem('shoefinity_buynow', JSON.stringify({ name: product.name, price: product.price, img: product.image, size: selectedSize, qty: currentQty }));
  window.location.href = "checkout.html";
};

window.openViewer = function(index) {
  if (!viewerImages.length) return;
  viewerIndex = index;
  document.getElementById('viewerImg').src = viewerImages[viewerIndex];
  document.getElementById('viewerCounter').textContent = (viewerIndex + 1) + ' / ' + viewerImages.length;
  document.getElementById('imgViewer').classList.add('active');
  document.body.style.overflow = 'hidden';
};
window.closeViewer = function() {
  document.getElementById('imgViewer').classList.remove('active');
  document.body.style.overflow = 'auto';
};
window.viewerNav = function(dir) {
  viewerIndex = (viewerIndex + dir + viewerImages.length) % viewerImages.length;
  document.getElementById('viewerImg').src = viewerImages[viewerIndex];
  document.getElementById('viewerCounter').textContent = (viewerIndex + 1) + ' / ' + viewerImages.length;
};

let vTouchStartX = 0;
document.getElementById('imgViewer').addEventListener('touchstart', e => { vTouchStartX = e.changedTouches[0].screenX; }, { passive: true });
document.getElementById('imgViewer').addEventListener('touchend', e => {
  const diff = vTouchStartX - e.changedTouches[0].screenX;
  if (Math.abs(diff) > 40) viewerNav(diff > 0 ? 1 : -1);
}, { passive: true });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeViewer();
  if (e.key === 'ArrowRight') viewerNav(1);
  if (e.key === 'ArrowLeft') viewerNav(-1);
});

const menuBtn = document.getElementById('menuBtn');
const sideNav = document.getElementById('sideNav');
const navMask = document.getElementById('navMask');
const toggleMenu = () => {
  menuBtn.classList.toggle('active');
  sideNav.classList.toggle('active');
  navMask.classList.toggle('active');
  document.body.style.overflow = sideNav.classList.contains('active') ? 'hidden' : 'auto';
};
menuBtn.onclick = toggleMenu;
navMask.onclick = toggleMenu;
</script>
</body>
</html>
