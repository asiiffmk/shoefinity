<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart | SHOEFINITY</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { background: #000000; color: white; overflow-x: hidden; }
.container { width: 92%; max-width: 1200px; margin: auto; }

/* ── HEADER ── */
header { padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; background: #000000; z-index: 1001; }
.nav { display: flex; justify-content: space-between; align-items: center; }
.brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; position: absolute; left: 50%; transform: translateX(-50%); }
.brand img { height: 35px; }
.brand span { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: 2px; font-size: 18px; }
.menu-toggle { display: flex; flex-direction: column; cursor: pointer; gap: 5px; z-index: 1100; }
.menu-toggle span { width: 22px; height: 2px; background: white; transition: 0.3s ease; display: block; }
.menu-toggle.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.menu-toggle.active span:nth-child(2) { opacity: 0; }
.menu-toggle.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.nav-actions { display: flex; align-items: center; gap: 15px; }
.cart-btn-nav { background: none; border: none; color: white; font-size: 18px; cursor: pointer; text-decoration: none; }

/* ── SIDE DRAWER ── */
nav { position: fixed; top: 0; left: -100%; background: #000; width: 80%; max-width: 320px; height: 100%; min-height: 100vh; display: flex; flex-direction: column; transition: 0.4s ease; z-index: 1000; border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; }
nav.active { left: 0; }
.nav-inner { display: flex; flex-direction: column; height: 100%; min-height: 100vh; padding: 90px 35px 35px 35px; }
.menu-list { display: flex; flex-direction: column; gap: 22px; list-style: none; margin-bottom: auto; }
.menu-list a { text-decoration: none; color: white; font-size: 16px; display: flex; align-items: center; gap: 15px; font-weight: 500; transition: 0.2s; }
.menu-list a:hover { color: white; }
.menu-list a::before { content: '\2022'; color: white; font-size: 20px; }
.drawer-footer { padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 40px; }
.social-links { display: flex; gap: 20px; margin-bottom: 18px; align-items: center; }
.social-links a { color: white; font-size: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; transition: 0.2s; text-decoration: none; }
.social-links a:hover { color: #00ff88; border-color: #00ff88; background: rgba(0,255,136,0.08); }
.footer-text { font-size: 11px; color: #555; letter-spacing: 1px; }
.nav-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(5px); visibility: hidden; opacity: 0; transition: 0.4s; z-index: 999; }
.nav-mask.active { visibility: visible; opacity: 1; }

/* ── PAGE HERO ── */
.page-hero { padding: 30px 0 10px; text-align: center; }
.page-hero h1 { font-family: 'Montserrat', sans-serif; font-weight: 800; text-transform: uppercase; font-size: 24px; }

/* ── CART LAYOUT ── */
.cart-section { padding: 20px 0 80px; }
.cart-layout { display: flex; flex-direction: column; gap: 20px; }
@media (min-width: 900px) {
  .cart-layout { flex-direction: row; align-items: flex-start; gap: 30px; }
  .cart-items-col { flex: 1; }
  .cart-summary-col { width: 360px; flex-shrink: 0; position: sticky; top: 90px; }
}

/* ── CART ITEMS ── */
.cart-item { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.07); }
.cart-item img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
.item-details { flex: 1; }
.item-details h3 { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: white; }
.item-size { font-size: 11px; color: #666; margin-bottom: 4px; }
.item-price { color: white; font-weight: 600; font-size: 13px; }
.qty-controls { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.qty-btn { background: #1a1a1a; border: 1px solid #333; color: white; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
.qty-btn:hover { border-color: #00ff88; }
.qty-count { font-size: 14px; font-weight: 600; width: 20px; text-align: center; }
.remove-btn { background: none; border: none; color: #ff4444; cursor: pointer; font-size: 16px; flex-shrink: 0; transition: 0.2s; padding: 5px; }
.remove-btn:hover { color: #ff6666; }

/* ── EMPTY BAG ── */
.empty-bag { text-align: center; padding: 80px 0; }
.empty-bag p { color: #555; font-size: 14px; margin-bottom: 25px; }
.shop-btn { display: inline-block; padding: 14px 40px; background: #00ff88; color: #000; text-decoration: none; font-weight: 700; border-radius: 10px; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; transition: 0.2s; }
.shop-btn:hover { background: #00e077; transform: translateY(-2px); }

/* ── CART SUMMARY ── */
.cart-summary { padding: 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; }
.summary-row { display: flex; justify-content: space-between; font-size: 13px; color: #aaa; margin-bottom: 10px; }
.total-row { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; color: white; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 5px; margin-bottom: 20px; }
.checkout-btn { display: block; width: 100%; padding: 16px; background: #00ff88; color: #000; text-align: center; text-decoration: none; font-weight: 700; border-radius: 10px; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; transition: 0.2s; border: none; cursor: pointer; }
.checkout-btn:hover { background: #00e077; transform: translateY(-2px); }
.shipping-note { text-align: center; margin-top: 12px; font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 1px; }

footer { text-align: center; padding: 30px 0; font-size: 12px; color: #666; border-top: 1px solid rgba(255,255,255,0.08); background: #000; }
</style>
</head>
<body>

<div class="nav-mask" id="navMask"></div>

<nav id="sideNav">
  <div class="nav-inner">
    <ul class="menu-list">
      <li><a href="index.html">Home</a></li>
      <li><a href="men.html">Men</a></li>
      <li><a href="women.html">Women</a></li>
      <li><a href="accessories.html">Accessories</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
    <div class="drawer-footer">
      <div class="social-links">
        <a href="https://instagram.com/shoefinity.co"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/917593001084"><i class="fab fa-whatsapp"></i></a>
       <a href="https://www.facebook.com/share/1HzPjhMR6M/" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="mailto:supportshoefinity.co@gmail.com"><i class="far fa-envelope"></i></a>
      </div>
      <div class="footer-text">&copy; 2026 Shoefinity Premium</div>
    </div>
  </div>
</nav>

<header>
  <div class="container nav">
    <div class="menu-toggle" id="menuBtn">
      <span></span><span></span><span></span>
    </div>
    <a href="index.html" class="brand">
      <img src="logo.png" alt="Logo">
      <span>SHOEFiNITY</span>
    </a>
    <div class="nav-actions">
      <a href="cart.html" class="cart-btn-nav"><i class="fas fa-shopping-bag"></i></a>
    </div>
  </div>
</header>

<section class="page-hero">
  <div class="container"><h1>Shopping Bag</h1></div>
</section>

<section class="cart-section">
  <div class="container" id="cart-content"></div>
</section>

<footer>
  <p>&copy; 2026 Shoefinity. All Rights Reserved.</p>
</footer>

<script>
const menuBtn = document.getElementById('menuBtn');
const sideNav = document.getElementById('sideNav');
const navMask = document.getElementById('navMask');
const toggleMenu = () => {
  menuBtn.classList.toggle('active');
  sideNav.classList.toggle('active');
  navMask.classList.toggle('active');
  document.body.style.overflow = sideNav.classList.contains('active') ? 'hidden' : 'auto';
};
menuBtn.onclick = toggleMenu;
navMask.onclick = toggleMenu;

function renderCart() {
  let cart = JSON.parse(localStorage.getItem("shoefinity_cart")) || [];
  const container = document.getElementById("cart-content");

  if (cart.length === 0) {
    container.innerHTML = `
      <div class="empty-bag">
        <i class="fas fa-shopping-bag" style="font-size:48px; color:#222; margin-bottom:20px; display:block;"></i>
        <p>Your bag is empty</p>
        <a href="index.html" class="shop-btn">Shop Now</a>
      </div>`;
    return;
  }

  let total = 0;
  let itemsHtml = cart.map((item, index) => {
    const itemTotal = item.price * item.qty;
    total += itemTotal;
    const sizeLabel = item.size ? `<p class="item-size">Size: ${item.size}</p>` : '';
    return `
      <div class="cart-item">
        <img src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/70x70/111/00ff88?text=IMG'">
        <div class="item-details">
          <h3>${item.name}</h3>
          ${sizeLabel}
          <p class="item-price">Rs. ${itemTotal.toLocaleString('en-IN')}</p>
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
            <span class="qty-count">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
          </div>
        </div>
        <button class="remove-btn" onclick="removeItem(${index})"><i class="fas fa-trash"></i></button>
      </div>
    `;
  }).join('');

  const summaryHtml = `
    <div class="cart-summary">
      <div class="summary-row"><span>Items (${cart.length})</span><span>Rs. ${total.toLocaleString('en-IN')}</span></div>
      <div class="summary-row"><span>Shipping</span><span>Calculated at checkout</span></div>
      <div class="total-row"><span>Total</span><span>Rs. ${total.toLocaleString('en-IN')}</span></div>
      <a href="checkout.html" class="checkout-btn">Proceed to Checkout</a>
      <p class="shipping-note">Secure checkout via WhatsApp</p>
    </div>
  `;

  container.innerHTML = `
    <div class="cart-layout">
      <div class="cart-items-col">${itemsHtml}</div>
      <div class="cart-summary-col">${summaryHtml}</div>
    </div>
  `;
}

function changeQty(index, amount) {
  let cart = JSON.parse(localStorage.getItem("shoefinity_cart")) || [];
  cart[index].qty += amount;
  if (cart[index].qty <= 0) cart.splice(index, 1);
  localStorage.setItem("shoefinity_cart", JSON.stringify(cart));
  renderCart();
}

function removeItem(index) {
  let cart = JSON.parse(localStorage.getItem("shoefinity_cart")) || [];
  cart.splice(index, 1);
  localStorage.setItem("shoefinity_cart", JSON.stringify(cart));
  renderCart();
}

renderCart();
</script>
</body>
</html>
