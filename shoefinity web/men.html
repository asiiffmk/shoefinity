<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Men | SHOEFINITY</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { background: #000; color: white; overflow-x: hidden; }
.container { width: 94%; max-width: 1200px; margin: auto; }
header { padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; background: #000; z-index: 1001; }
.nav { display: flex; justify-content: space-between; align-items: center; }
.brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; position: absolute; left: 50%; transform: translateX(-50%); }
.brand img { height: 35px; }
.brand span { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: 2px; font-size: 18px; }
.menu-toggle { display: flex; flex-direction: column; cursor: pointer; gap: 5px; z-index: 1100; }
.menu-toggle span { width: 22px; height: 2px; background: white; transition: 0.3s ease; display: block; }
.menu-toggle.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.menu-toggle.active span:nth-child(2) { opacity: 0; }
.menu-toggle.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.nav-actions { display: flex; align-items: center; gap: 15px; }
.search-btn, .cart-btn-nav { background: none; border: none; color: white; font-size: 18px; cursor: pointer; text-decoration: none; }
.search-bar-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); z-index: 2100; display: none; align-items: flex-start; justify-content: center; padding-top: 100px; }
.search-bar-wrapper.active { display: flex; }
.search-bar-inner { width: 90%; max-width: 500px; position: relative; }
.search-bar-inner input { width: 100%; padding: 16px 50px 16px 20px; border-radius: 12px; border: 2px solid #00ff88; background: #111; color: white; font-size: 16px; outline: none; }
.search-bar-inner input::placeholder { color: #666; }
.search-close { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer; }
.search-results { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; max-height: 60vh; overflow-y: auto; }
.search-result-item { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.08); transition: 0.2s; text-decoration: none; }
.search-result-item:hover { border-color: #00ff88; }
.search-result-item img { width: 55px; height: 55px; object-fit: cover; border-radius: 8px; }
.search-result-info h4 { font-size: 14px; font-weight: 500; color: white; }
.search-result-info p { font-size: 13px; color: white; font-weight: 600; }
.search-no-result { text-align: center; color: #666; font-size: 14px; padding: 20px 0; }
nav { position: fixed; top: 0; left: -100%; background: #000; width: 80%; max-width: 320px; height: 100%; min-height: 100vh; display: flex; flex-direction: column; transition: 0.4s ease; z-index: 1000; border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; }
nav.active { left: 0; }
.nav-inner { display: flex; flex-direction: column; height: 100%; min-height: 100vh; padding: 90px 35px 35px 35px; }
.menu-list { display: flex; flex-direction: column; gap: 22px; list-style: none; margin-bottom: auto; }
.menu-list a { text-decoration: none; color: white; font-size: 16px; display: flex; align-items: center; gap: 15px; font-weight: 500; transition: 0.2s; }
.menu-list a:hover { color: white; }
.menu-list a::before { content: '\2022'; color: white; font-size: 20px; }
.drawer-footer { padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 40px; }
.social-links { display: flex; gap: 20px; margin-bottom: 18px; align-items: center; }
.social-links a { color: white; font-size: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; transition: 0.2s; text-decoration: none; }
.social-links a:hover { color: #00ff88; border-color: #00ff88; background: rgba(0,255,136,0.08); }
.footer-text { font-size: 11px; color: #555; letter-spacing: 1px; }
.nav-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(5px); visibility: hidden; opacity: 0; transition: 0.4s; z-index: 999; }
.nav-mask.active { visibility: visible; opacity: 1; }
.page-hero { padding: 25px 0 15px; text-align: center; }
.page-hero h1 { font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
.brand-filter-wrap { padding: 10px 0 20px; }
.brand-filter-row { display: flex; gap: 12px; overflow-x: auto; padding: 4px 2px 8px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
.brand-filter-row::-webkit-scrollbar { display: none; }
.brand-item { display: flex; flex-direction: column; align-items: center; gap: 0; cursor: pointer; scroll-snap-align: start; flex-shrink: 0; }
.brand-img-wrap { width: 80px; height: 80px; border-radius: 14px; overflow: hidden; border: 2px solid transparent; transition: 0.2s; background: #111; }
.brand-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.brand-item.active .brand-img-wrap { border-color: #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.3); }
.brand-item:hover .brand-img-wrap { border-color: rgba(0,255,136,0.5); }
.product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px 10px; padding-bottom: 70px; }
@media (min-width: 600px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 24px 16px; } }
@media (min-width: 900px) { .product-grid { grid-template-columns: repeat(4, 1fr); gap: 28px 20px; } }
@keyframes shimmer { 0% { background-position: -600px 0; } 100% { background-position: 600px 0; } }
.skeleton-card { background: transparent; }
.skeleton-img { width: 100%; aspect-ratio: 3/4; border-radius: 10px; background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%); background-size: 600px 100%; animation: shimmer 1.4s infinite; }
.skeleton-line { height: 12px; border-radius: 6px; margin-top: 10px; background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%); background-size: 600px 100%; animation: shimmer 1.4s infinite; }
.skeleton-line.short { width: 60%; margin-top: 7px; }
.product-card { background: transparent; cursor: pointer; position: relative; text-decoration: none; display: block; }
.product-card:hover .card-img-wrap img { transform: scale(1.03); }
.card-img-wrap { position: relative; width: 100%; aspect-ratio: 3/4; overflow: hidden; border-radius: 10px; background: #1a1a1a; }
.card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
.sale-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(30,30,30,0.88); color: #fff; font-size: 11px; font-weight: 600; padding: 5px 14px; border-radius: 20px; z-index: 2; }
.product-info { padding: 9px 2px 0 2px; }
.product-info h3 { font-size: 12px; font-weight: 800; color: white; text-transform: uppercase; letter-spacing: 0.2px; line-height: 1.35; margin-bottom: 4px; }
.price-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.price-original { font-size: 12px; color: #666; font-weight: 500; text-decoration: line-through; }
.price-current { font-size: 13px; color: white; font-weight: 600; }
.no-results { grid-column: 1/-1; text-align: center; color: #555; padding: 40px 0; font-size: 14px; }
footer { text-align: center; padding: 30px 0; font-size: 12px; color: #666; border-top: 1px solid rgba(255,255,255,0.08); background: #000; }
</style>
</head>
<body>

<div class="search-bar-wrapper" id="searchWrapper">
  <div class="search-bar-inner">
    <input type="text" id="searchInput" placeholder="Search products..." oninput="handleSearch()">
    <button class="search-close" onclick="closeSearch()"><i class="fas fa-times"></i></button>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<div class="nav-mask" id="navMask"></div>

<nav id="sideNav">
  <div class="nav-inner">
    <ul class="menu-list">
      <li><a href="index.html">Home</a></li>
      <li><a href="men.html">Men</a></li>
      <li><a href="women.html">Women</a></li>
      <li><a href="accessories.html">Accessories</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
    <div class="drawer-footer">
      <div class="social-links">
        <a href="https://instagram.com/shoefinity.co"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/917593001084"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.facebook.com/share/1HzPjhMR6M/" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="mailto:supportshoefinity.co@gmail.com"><i class="far fa-envelope"></i></a>
      </div>
      <div class="footer-text">&copy; 2026 Shoefinity Premium</div>
    </div>
  </div>
</nav>

<header>
  <div class="container nav">
    <div class="menu-toggle" id="menuBtn"><span></span><span></span><span></span></div>
    <a href="index.html" class="brand">
      <img src="logo.png" alt="Logo">
      <span>SHOEFiNITY</span>
    </a>
    <div class="nav-actions">
      <button class="search-btn" onclick="openSearch()"><i class="fas fa-search"></i></button>
      <a href="cart.html" class="cart-btn-nav"><i class="fas fa-shopping-bag"></i></a>
    </div>
  </div>
</header>

<section class="page-hero">
  <div class="container"><h1>Men Collection</h1></div>
</section>

<div class="container brand-filter-wrap">
  <p style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#fff;margin-bottom:10px;">Filter by Brand</p>
  <div class="brand-filter-row" id="brandRow">
    <div class="brand-item" onclick="filterBrand('nike')" id="brand-nike"><div class="brand-img-wrap"><img src="nike.jpeg" alt="Nike"></div></div>
    <div class="brand-item" onclick="filterBrand('adidas')" id="brand-adidas"><div class="brand-img-wrap"><img src="adidas.jpeg" alt="Adidas"></div></div>
    <div class="brand-item" onclick="filterBrand('air jordan')" id="brand-air jordan"><div class="brand-img-wrap"><img src="air jordan.jpeg" alt="Air Jordan"></div></div>
    <div class="brand-item" onclick="filterBrand('new balance')" id="brand-new balance"><div class="brand-img-wrap"><img src="new balance.jpeg" alt="New Balance"></div></div>
    <div class="brand-item" onclick="filterBrand('otsk-tgr')" id="brand-otsk-tgr"><div class="brand-img-wrap"><img src="otsk-tgr.jpeg" alt="Otsk-tgr"></div></div>
    <div class="brand-item" onclick="filterBrand('aasic')" id="brand-aasic"><div class="brand-img-wrap"><img src="aasic.jpeg" alt="Aasic"></div></div>
    <div class="brand-item" onclick="filterBrand('puma')" id="brand-puma"><div class="brand-img-wrap"><img src="puma.jpeg" alt="Puma"></div></div>
  </div>
</div>

<section class="container product-grid" id="grid"></section>
<footer><p>&copy; 2026 Shoefinity. All Rights Reserved.</p></footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDh2DnnTGlLb2fVsdDsTheKgkBVzJBPcJc",
  authDomain: "shoefinity-store.firebaseapp.com",
  projectId: "shoefinity-store",
  storageBucket: "shoefinity-store.appspot.com",
  messagingSenderId: "876278213787",
  appId: "1:876278213787:web:80269ea8a13e119afbea3e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
enableIndexedDbPersistence(db).catch(err => console.log('Cache:', err));

let allProducts = [];
let activeBrand = null;

function showSkeletons() {
  const grid = document.getElementById('grid');
  grid.innerHTML = Array(6).fill(`
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line short"></div>
    </div>
  `).join('');
}
showSkeletons();

async function fetchProducts() {
  try {
    const snapshot = await getDocs(collection(db, "products"));
    const all = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    allProducts = all.filter(p => p.category === 'Men' || p.category === 'Unisex');
    allProducts.sort((a, b) => {
      const aTime = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
      const bTime = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
      return bTime - aTime;
    });
    renderGrid();
  } catch (err) {
    document.getElementById('grid').innerHTML =
      "<p style='grid-column:1/-1;text-align:center;color:#f66;'>Error: " + err.message + "</p>";
  }
}

function detectBrand(name) {
  const n = name.toLowerCase();
  if (n.includes('nike')) return 'nike';
  if (n.includes('adidas')) return 'adidas';
  if (n.includes('jordan')) return 'air jordan';
  if (n.includes('new balance')) return 'new balance';
  if (n.includes('otsk-tgr') || n.includes('osktgr')) return 'otsk-tgr';
  if (n.includes('aasic') || n.includes('asics')) return 'aasic';
  if (n.includes('puma')) return 'puma';
  return null;
}

window.filterBrand = function(brand) {
  if (activeBrand === brand) {
    activeBrand = null;
    document.querySelectorAll('.brand-item').forEach(b => b.classList.remove('active'));
    renderGrid(allProducts);
  } else {
    activeBrand = brand;
    document.querySelectorAll('.brand-item').forEach(b => b.classList.remove('active'));
    const el = document.getElementById('brand-' + brand);
    if (el) el.classList.add('active');
    const filtered = allProducts.filter(p => detectBrand(p.name) === brand);
    renderGrid(filtered);
  }
};

function priceHTML(p) {
  if (p.originalPrice && p.originalPrice > p.price) {
    return `<span class="price-original">Rs. ${Number(p.originalPrice).toLocaleString('en-IN')}</span>
            <span class="price-current">Rs. ${Number(p.price).toLocaleString('en-IN')}</span>`;
  }
  return `<span class="price-current">Rs. ${Number(p.price).toLocaleString('en-IN')}</span>`;
}

function renderGrid(products = allProducts) {
  const grid = document.getElementById("grid");
  if (!products.length) {
    grid.innerHTML = "<p class='no-results'>No products found for this brand.</p>";
    return;
  }
  grid.innerHTML = products.map(p => `
    <a class="product-card" href="product.html?id=${p.id}">
      <div class="card-img-wrap">
        ${p.originalPrice && p.originalPrice > p.price ? '<div class="sale-badge">Sale</div>' : ''}
        <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300x400/1a1a1a/666?text=No+Image'" loading="lazy">
      </div>
      <div class="product-info">
        <h3>${p.name}</h3>
        <div class="price-row">${priceHTML(p)}</div>
      </div>
    </a>
  `).join('');
}

window.openSearch = function() { document.getElementById('searchWrapper').classList.add('active'); document.getElementById('searchInput').focus(); document.getElementById('searchResults').innerHTML = ''; document.getElementById('searchInput').value = ''; document.body.style.overflow = 'hidden'; };
window.closeSearch = function() { document.getElementById('searchWrapper').classList.remove('active'); document.body.style.overflow = 'auto'; };
window.handleSearch = function() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const resultsBox = document.getElementById('searchResults');
  if (!q) { resultsBox.innerHTML = ''; return; }
  const matches = allProducts.filter(p => p.name.toLowerCase().includes(q));
  if (!matches.length) { resultsBox.innerHTML = `<p class="search-no-result">No products found for "<b>${q}</b>"</p>`; return; }
  resultsBox.innerHTML = matches.map(p => `
    <a class="search-result-item" href="product.html?id=${p.id}">
      <img src="${p.image}" alt="${p.name}">
      <div class="search-result-info">
        <h4>${p.name}</h4>
        <p>Rs. ${Number(p.price).toLocaleString('en-IN')}</p>
      </div>
    </a>
  `).join('');
};

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });

const menuBtn = document.getElementById('menuBtn');
const sideNav = document.getElementById('sideNav');
const navMask = document.getElementById('navMask');
const toggleMenu = () => {
  menuBtn.classList.toggle('active');
  sideNav.classList.toggle('active');
  navMask.classList.toggle('active');
  document.body.style.overflow = sideNav.classList.contains('active') ? 'hidden' : 'auto';
};
menuBtn.onclick = toggleMenu;
navMask.onclick = toggleMenu;

fetchProducts();
</script>
</body>
</html>
