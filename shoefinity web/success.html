<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed | SHOEFINITY</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { background: #000; color: white; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
.container { width: 92%; margin: auto; }

/* ── HEADER ── */
header { padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.08); background: #000; }
.nav { display: flex; justify-content: space-between; align-items: center; }
.brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; position: absolute; left: 50%; transform: translateX(-50%); }
.brand img { height: 35px; }
.brand span { font-family: 'Montserrat', sans-serif; font-weight: 800; letter-spacing: 2px; font-size: 18px; }
.nav-left { width: 40px; }
.nav-right a { background: none; border: none; color: white; font-size: 18px; text-decoration: none; }

/* ── SUCCESS SECTION ── */
.success-section {
  flex: 1; display: flex; align-items: center;
  justify-content: center; text-align: center;
  padding: 60px 20px;
}

.success-box {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px; padding: 50px 35px;
  max-width: 480px; width: 100%;
  animation: fadeUp 0.7s ease forwards;
  opacity: 0; transform: translateY(30px);
}

/* ── CHECK ICON ── */
.check-circle {
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(0,255,136,0.1);
  border: 2px solid #00ff88;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 25px;
  animation: pop 0.6s ease 0.3s forwards;
  transform: scale(0);
}
.check-circle i { font-size: 32px; color: #00ff88; }

.success-box h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: 26px; font-weight: 800;
  color: white; margin-bottom: 12px;
  letter-spacing: -0.5px;
}

.success-box p {
  color: #888; font-size: 14px;
  line-height: 1.7; margin-bottom: 25px;
}

.divider { height: 1px; background: rgba(255,255,255,0.06); margin: 25px 0; }

.whatsapp-note {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; font-size: 13px; color: #666; margin-bottom: 30px;
}
.whatsapp-note i { color: #25d366; font-size: 16px; }

/* ── BUTTONS ── */
.btn-group { display: flex; flex-direction: column; gap: 12px; }
.continue-btn {
  display: block; width: 100%; padding: 15px;
  background: #00ff88; color: #000;
  font-weight: 700; font-size: 14px;
  border: none; border-radius: 12px;
  cursor: pointer; text-transform: uppercase;
  letter-spacing: 1px; transition: 0.2s;
  font-family: 'Poppins', sans-serif;
  text-decoration: none; text-align: center;
}
.continue-btn:hover { background: #00e077; transform: translateY(-2px); }
.cart-btn {
  display: block; width: 100%; padding: 15px;
  background: transparent; color: white;
  font-weight: 600; font-size: 14px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px; cursor: pointer;
  text-transform: uppercase; letter-spacing: 1px;
  transition: 0.2s; font-family: 'Poppins', sans-serif;
  text-decoration: none; text-align: center;
}
.cart-btn:hover { border-color: white; }

/* ── FOOTER ── */
footer { text-align: center; padding: 30px 0; font-size: 12px; color: #666; border-top: 1px solid rgba(255,255,255,0.08); background: #000; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pop {
  0% { transform: scale(0); }
  80% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
</style>
</head>
<body>

<header>
  <div class="container nav">
    <div class="nav-left"></div>
    <a href="index.html" class="brand">
      <img src="logo.png" alt="Logo">
      <span>SHOEFINITY</span>
    </a>
    <div class="nav-right">
      <a href="cart.html"><i class="fas fa-shopping-bag"></i></a>
    </div>
  </div>
</header>

<section class="success-section">
  <div class="success-box">

    <div class="check-circle">
      <i class="fas fa-check"></i>
    </div>

    <h1>Order Confirmed!</h1>
    <p>Thank you for shopping with Shoefinity.<br>Your order has been successfully placed via WhatsApp.</p>

    <div class="divider"></div>

    <div class="whatsapp-note">
      <i class="fab fa-whatsapp"></i>
      <span>We'll confirm your order on WhatsApp shortly</span>
    </div>

    <div class="btn-group">
      <a href="index.html" class="continue-btn">Continue Shopping</a>
      <a href="cart.html" class="cart-btn">View Cart</a>
    </div>

  </div>
</section>

<footer>
  <p>&copy; 2026 Shoefinity. All Rights Reserved.</p>
</footer>

</body>
</html>
