<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoefinity - Premium Footwear</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { background: #000000; color: white; overflow-x: hidden; scroll-behavior: smooth; }
.container { width: 90%; max-width: 1200px; margin: auto; }
header { padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; background: #000000; z-index: 1001; }
.nav { display: flex; justify-content: space-between; align-items: center; }
.brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; position: absolute; left: 50%; transform: translateX(-50%); cursor: pointer; }
.brand img { height: 35px; }
.brand span { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: 2px; font-size: 18px; }
.menu-toggle { display: flex; flex-direction: column; cursor: pointer; gap: 5px; z-index: 1100; }
.menu-toggle span { width: 22px; height: 2px; background: white; transition: 0.3s ease; display: block; }
.menu-toggle.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.menu-toggle.active span:nth-child(2) { opacity: 0; }
.menu-toggle.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.nav-actions { display: flex; align-items: center; gap: 15px; }
.search-btn, .cart-btn-nav { background: none; border: none; color: white; font-size: 18px; cursor: pointer; text-decoration: none; }
.search-bar-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 2100; display: none; align-items: flex-start; justify-content: center; padding-top: 90px; }
.search-bar-wrapper.active { display: flex; }
.search-bar-inner { width: 90%; max-width: 560px; position: relative; }
.search-bar-inner input { width: 100%; padding: 16px 50px 16px 20px; border-radius: 12px; border: 2px solid #00ff88; background: #111; color: white; font-size: 16px; outline: none; }
.search-bar-inner input::placeholder { color: #555; }
.search-close { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer; }
.search-results { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; max-height: 65vh; overflow-y: auto; }
.search-category-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: white; padding: 8px 4px 4px; font-weight: 600; }
.search-result-item { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.07); transition: 0.2s; text-decoration: none; }
.search-result-item:hover { border-color: #00ff88; background: rgba(0,255,136,0.05); }
.search-result-item img { width: 52px; height: 52px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
.search-result-info { flex: 1; }
.search-result-info h4 { font-size: 14px; font-weight: 500; margin-bottom: 3px; color: white; }
.search-result-meta { display: flex; align-items: center; gap: 8px; }
.search-result-price { font-size: 13px; color: white; font-weight: 600; }
.search-result-cat { font-size: 10px; background: rgba(255,255,255,0.08); color: white; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px; }
.search-result-arrow { color: #444; font-size: 14px; flex-shrink: 0; }
.search-no-result { text-align: center; color: #555; font-size: 14px; padding: 30px 0; }
.search-count { font-size: 12px; color: #666; padding: 4px 0 8px; text-align: right; }
.hero-slider { height: 60vh; width: 95%; position: relative; overflow: hidden; margin: 20px auto; border-radius: 10px; touch-action: pan-y; cursor: pointer; }
@media (min-width: 900px) { .hero-slider { height: 70vh; } }
.slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 1s ease-in-out; }
.slide.active { opacity: 1; }
.slide::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.35); }
.hero-slider.loading { background: linear-gradient(90deg, #0a0a0a 25%, #1c1c1c 50%, #0a0a0a 75%); background-size: 200% 100%; animation: shimmer 1.8s infinite ease-in-out; }
.hero-slider.loading .slide { opacity: 0 !important; }
.hero-slider.loading::before { content: 'SHOEFINITY'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: 8px; color: rgba(255,255,255,0.06); animation: pulse-text 1.8s infinite ease-in-out; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
@keyframes pulse-text { 0%, 100% { color: rgba(255,255,255,0.04); } 50% { color: rgba(255,255,255,0.12); } }
.why-section { padding: 80px 0 40px 0; text-align: center; }
.why-heading { font-family: 'Poppins', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 5px; color: white; }
@media (min-width: 900px) { .why-heading { font-size: 42px; } }
.why-subtext { font-size: 14px; color: white; letter-spacing: 2px; text-transform: uppercase; }
.category-container { display: flex; flex-direction: column; gap: 20px; padding-bottom: 80px; }
@media (min-width: 900px) { .category-container { flex-direction: row; gap: 16px; } }
.category-card { position: relative; height: 350px; width: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
@media (min-width: 900px) { .category-card { height: 500px; flex: 1; } }
.category-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94); z-index: 1; }
.category-card:hover .category-bg { transform: scale(1.08); }
.men-bg { background-image: url('men.jpeg'); }
.women-bg { background-image: url('women.jpeg'); }
.acc-bg { background-image: url('main acc.jpg'); }
.category-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background 0.4s ease; z-index: 2; }
.category-card:hover .category-overlay { background: rgba(0,0,0,0.3); }
.category-card h3 { font-family: 'Montserrat', sans-serif; font-size: 32px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); color: white; }
.cat-btn { padding: 10px 40px; border: 1px solid white; border-radius: 30px; color: white; text-decoration: none; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; backdrop-filter: blur(5px); transition: 0.3s; }
.cat-btn:hover { background: white; color: #000; transform: scale(1.05); }
nav { position: fixed; top: 0; left: -100%; background: #000; width: 80%; max-width: 320px; height: 100%; min-height: 100vh; display: flex; flex-direction: column; transition: 0.4s ease; z-index: 1000; border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; }
nav.active { left: 0; }
.nav-inner { display: flex; flex-direction: column; height: 100%; min-height: 100vh; padding: 90px 35px 35px 35px; }
.menu-list { display: flex; flex-direction: column; gap: 22px; list-style: none; margin-bottom: auto; }
.menu-list a { text-decoration: none; color: white; font-size: 16px; display: flex; align-items: center; gap: 15px; font-weight: 500; transition: 0.2s; }
.menu-list a:hover { color: white; }
.menu-list a::before { content: '\2022'; color: white; font-size: 20px; }
.drawer-footer { padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 40px; }
.social-links { display: flex; gap: 20px; margin-bottom: 18px; align-items: center; }
.social-links a { color: white; font-size: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; transition: 0.2s; text-decoration: none; }
.social-links a:hover { color: #00ff88; border-color: #00ff88; background: rgba(0,255,136,0.08); }
.footer-text { font-size: 11px; color: #555; letter-spacing: 1px; }
.nav-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(5px); visibility: hidden; opacity: 0; transition: 0.4s ease; z-index: 999; }
.nav-overlay.active { visibility: visible; opacity: 1; }
footer { text-align: center; padding: 40px 0; font-size: 12px; color: #666; border-top: 1px solid rgba(255,255,255,0.08); background: #000; }
</style>
</head>
<body>

<div class="search-bar-wrapper" id="searchWrapper">
  <div class="search-bar-inner">
    <input type="text" id="searchInput" placeholder="Search all products..." oninput="handleSearch()">
    <button class="search-close" onclick="closeSearch()"><i class="fas fa-times"></i></button>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<div class="nav-overlay" id="nav-overlay"></div>

<nav id="nav-links">
  <div class="nav-inner">
    <ul class="menu-list">
      <li><a href="index.html">Home</a></li>
      <li><a href="men.html">Men</a></li>
      <li><a href="women.html">Women</a></li>
      <li><a href="accessories.html">Accessories</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
    <div class="drawer-footer">
      <div class="social-links">
        <a href="https://instagram.com/shoefinity.co"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/917593001084"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.facebook.com/share/1HzPjhMR6M/" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="mailto:supportshoefinity.co@gmail.com"><i class="far fa-envelope"></i></a>
      </div>
      <div class="footer-text">&copy; 2026 Shoefinity Premium</div>
    </div>
  </div>
</nav>

<header>
  <div class="container nav">
    <div class="menu-toggle" id="menu-toggle">
      <span></span><span></span><span></span>
    </div>
    <a href="index.html" class="brand">
      <img src="logo.png" alt="Logo">
      <span>SHOEFiNITY</span>
    </a>
    <div class="nav-actions">
      <button class="search-btn" onclick="openSearch()"><i class="fas fa-search"></i></button>
      <a href="cart.html" class="cart-btn-nav"><i class="fas fa-shopping-bag"></i></a>
    </div>
  </div>
</header>

<section class="hero-slider loading" id="heroSlider">
  <div class="slide active"></div>
  <div class="slide"></div>
  <div class="slide"></div>
</section>

<section class="why-section">
  <div class="container">
    <h2 class="why-heading">Why Shoefinity?</h2>
    <p class="why-subtext">Infinite Style. Endless Comfort.</p>
  </div>
</section>

<section class="container category-container">
  <div class="category-card">
    <div class="category-bg men-bg"></div>
    <div class="category-overlay">
      <h3>Men</h3>
      <a href="men.html" class="cat-btn">Shop now</a>
    </div>
  </div>
  <div class="category-card">
    <div class="category-bg women-bg"></div>
    <div class="category-overlay">
      <h3>Women</h3>
      <a href="women.html" class="cat-btn">Shop now</a>
    </div>
  </div>
  <div class="category-card">
    <div class="category-bg acc-bg"></div>
    <div class="category-overlay">
      <h3>Accessories</h3>
      <a href="accessories.html" class="cat-btn">Shop now</a>
    </div>
  </div>
</section>

<footer>
  <p>&copy; 2026 Shoefinity. All Rights Reserved.</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDh2DnnTGlLb2fVsdDsTheKgkBVzJBPcJc",
  authDomain: "shoefinity-store.firebaseapp.com",
  projectId: "shoefinity-store",
  storageBucket: "shoefinity-store.appspot.com",
  messagingSenderId: "876278213787",
  appId: "1:876278213787:web:80269ea8a13e119afbea3e"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
enableIndexedDbPersistence(db).catch(err => console.log('Cache:', err));

let allProducts = [];
let slideLinks  = [];

async function loadHeroSlides() {
  const sliderEl = document.getElementById('heroSlider');
  try {
    const docSnap = await getDoc(doc(db, "settings", "hero_slides"));
    if (docSnap.exists()) {
      const slides = docSnap.data().slides || [];
      slideLinks   = docSnap.data().slide_links || [];
      await Promise.all(slides.map(url => new Promise(resolve => {
        if (!url) { resolve(); return; }
        const img = new Image();
        img.onload = resolve;
        img.onerror = resolve;
        img.src = url;
      })));
      const slideEls = document.querySelectorAll('.slide');
      slideEls.forEach((el, i) => {
        if (slides[i]) el.style.backgroundImage = `url('${slides[i]}')`;
      });
    }
  } catch(err) {
    console.log('Slide load error:', err.message);
  }
  sliderEl.classList.remove('loading');
}
loadHeroSlides();

async function fetchAllProducts() {
  try {
    const snapshot = await getDocs(collection(db, "products"));
    allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  } catch(err) {
    console.error("Error fetching products:", err);
  }
}
fetchAllProducts();

window.openSearch = function() {
  document.getElementById('searchWrapper').classList.add('active');
  document.getElementById('searchInput').focus();
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('searchInput').value = '';
  document.body.style.overflow = 'hidden';
};
window.closeSearch = function() {
  document.getElementById('searchWrapper').classList.remove('active');
  document.body.style.overflow = 'auto';
};
window.handleSearch = function() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const resultsBox = document.getElementById('searchResults');
  if (!q) { resultsBox.innerHTML = ''; return; }
  const matches = allProducts.filter(p => p.name.toLowerCase().includes(q));
  if (!matches.length) {
    resultsBox.innerHTML = `<p class="search-no-result">No products found for "<b>${q}</b>"</p>`;
    return;
  }
  const grouped = {};
  matches.forEach(p => {
    const cat = p.category || 'Other';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(p);
  });
  const totalCount = matches.length;
  let html = `<p class="search-count">${totalCount} result${totalCount > 1 ? 's' : ''} found</p>`;
  ['Men', 'Women', 'Unisex', 'Accessories'].forEach(cat => {
    if (!grouped[cat]) return;
    html += `<div class="search-category-label"><i class="fas fa-tag" style="margin-right:5px;"></i>${cat}</div>`;
    html += grouped[cat].map(p => `
      <a class="search-result-item" href="product.html?id=${p.id}">
        <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/52x52/111/00ff88?text=IMG'">
        <div class="search-result-info">
          <h4>${p.name}</h4>
          <div class="search-result-meta">
            <span class="search-result-price">Rs. ${Number(p.price).toLocaleString('en-IN')}</span>
            <span class="search-result-cat">${p.category}</span>
          </div>
        </div>
        <i class="fas fa-chevron-right search-result-arrow"></i>
      </a>
    `).join('');
  });
  resultsBox.innerHTML = html;
};

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });

const toggle  = document.getElementById("menu-toggle");
const nav     = document.getElementById("nav-links");
const overlay = document.getElementById("nav-overlay");
const toggleMenu = () => {
  toggle.classList.toggle("active");
  nav.classList.toggle("active");
  overlay.classList.toggle("active");
  document.body.style.overflow = nav.classList.contains("active") ? "hidden" : "auto";
};
toggle.addEventListener("click", toggleMenu);
overlay.addEventListener("click", toggleMenu);

const slides = document.querySelectorAll('.slide');
let currentSlide = 0;
let slideInterval = setInterval(nextSlide, 5000);

function updateSliderUI() {
  slides.forEach(s => s.classList.remove('active'));
  slides[currentSlide].classList.add('active');
}
function nextSlide() {
  currentSlide = (currentSlide + 1) % slides.length;
  updateSliderUI();
}
function prevSlide() {
  currentSlide = (currentSlide - 1 + slides.length) % slides.length;
  updateSliderUI();
}

const sliderEl = document.getElementById('heroSlider');
let touchStartX = 0, touchStartY = 0;
let swipeMoved = false;

sliderEl.addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
  swipeMoved = false;
}, { passive: true });

sliderEl.addEventListener('touchmove', e => {
  const diffX = Math.abs(touchStartX - e.changedTouches[0].screenX);
  if (diffX > 10) swipeMoved = true;
}, { passive: true });

sliderEl.addEventListener('touchend', e => {
  const touchEndX = e.changedTouches[0].screenX;
  const diffX = touchStartX - touchEndX;
  const diffY = Math.abs(touchStartY - e.changedTouches[0].screenY);
  if (Math.abs(diffX) > 40 && Math.abs(diffX) > diffY) {
    clearInterval(slideInterval);
    if (diffX > 0) { nextSlide(); } else { prevSlide(); }
    slideInterval = setInterval(nextSlide, 5000);
  } else if (!swipeMoved) {
    const productId = (slideLinks[currentSlide] || '').trim();
    if (productId === 'sale') {
      window.location.href = 'sale.html';
    } else if (productId) {
      window.location.href = `product.html?id=${productId}`;
    }
  }
}, { passive: true });

sliderEl.addEventListener('click', e => {
  if (swipeMoved) { swipeMoved = false; return; }
  const productId = (slideLinks[currentSlide] || '').trim();
  if (productId === 'sale') {
    window.location.href = 'sale.html';
  } else if (productId) {
    window.location.href = `product.html?id=${productId}`;
  }
});
</script>
</body>
</html>
